<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Compare</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #0a0a0a, #111);
  color: white;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 18px;
  margin-bottom: 15px;
  border: 1px solid rgba(255,255,255,0.1);
}

h1 {
  margin: 0;
  font-size: 26px;
}

.subtitle {
  opacity: 0.7;
  margin-top: 5px;
}

input, select {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 14px;
  border: none;
  background: #111;
  color: white;
  font-size: 15px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  border-radius: 14px;
  border: none;
  font-weight: bold;
  font-size: 16px;
  background: linear-gradient(90deg, #ff4d6d, #c77dff);
  color: white;
}

.score {
  font-size: 48px;
  font-weight: bold;
  background: linear-gradient(90deg, #ff4d6d, #c77dff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.label {
  opacity: 0.7;
}

.section {
  margin-top: 15px;
}

ul {
  padding-left: 18px;
}

.quote {
  margin-top: 15px;
  font-style: italic;
  opacity: 0.9;
}

.name {
  font-size: 22px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>Birthday Compare</h1>
<div class="subtitle">Find your real compatibility</div>
</div>

<div class="card">

<input id="name1" placeholder="Name 1">
<input id="dob1" type="date">

<input id="name2" placeholder="Name 2">
<input id="dob2" type="date">

<select id="mode">
<option value="love">❤️ Relationship</option>
<option value="friend">🤝 Friendship</option>
<option value="business">💼 Business</option>
</select>

<button onclick="compare()">Compare</button>

</div>

<div id="result" class="card" style="display:none;"></div>

</div>

<script>

// ===== DATA =====

const signs = [
{ name:'Capricorn', start:[12,22], end:[1,19], element:'Earth' },
{ name:'Aquarius', start:[1,20], end:[2,18], element:'Air' },
{ name:'Pisces', start:[2,19], end:[3,20], element:'Water' },
{ name:'Aries', start:[3,21], end:[4,19], element:'Fire' },
{ name:'Taurus', start:[4,20], end:[5,20], element:'Earth' },
{ name:'Gemini', start:[5,21], end:[6,20], element:'Air' },
{ name:'Cancer', start:[6,21], end:[7,22], element:'Water' },
{ name:'Leo', start:[7,23], end:[8,22], element:'Fire' },
{ name:'Virgo', start:[8,23], end:[9,22], element:'Earth' },
{ name:'Libra', start:[9,23], end:[10,22], element:'Air' },
{ name:'Scorpio', start:[10,23], end:[11,21], element:'Water' },
{ name:'Sagittarius', start:[11,22], end:[12,21], element:'Fire' }
];

const stones = {
1:'Garnet',2:'Amethyst',3:'Aquamarine',4:'Diamond',
5:'Emerald',6:'Pearl',7:'Ruby',8:'Peridot',
9:'Sapphire',10:'Opal',11:'Topaz',12:'Turquoise'
};

const summaries = [
"This connection has strong potential when both people understand each other.",
"There is a strong pull here, but it needs effort to grow.",
"This pairing can feel natural but still requires communication.",
"This connection can either grow strong or fade depending on effort."
];

const quotes = [
"You feel like home, but only if both of you communicate.",
"High chemistry. Medium stability.",
"Soft connection, strong pull.",
"This match works when no one tries to control the other."
];

const strengthsList = [
"Natural connection",
"Strong emotional understanding",
"Good communication potential",
"Balanced energy",
"Mutual attraction"
];

const challengesList = [
"Different emotional needs",
"Communication gaps",
"Timing differences",
"Overthinking",
"Need for reassurance"
];

// ===== FUNCTIONS =====

function getSign(date){
let d = new Date(date);
let m = d.getMonth()+1;
let day = d.getDate();

for(let s of signs){
let [sm,sd]=s.start;
let [em,ed]=s.end;

if(
(sm<=em && (m==sm && day>=sd || m==em && day<=ed || (m>sm && m<em))) ||
(sm>em && (m==sm && day>=sd || m==em && day<=ed || m>sm || m<em))
){
return s;
}
}
}

function lifePath(date){
let nums = date.replace(/-/g,'').split('').map(Number);
let total = nums.reduce((a,b)=>a+b,0);
while(total>9 && total!=11 && total!=22){
total = total.toString().split('').map(Number).reduce((a,b)=>a+b,0);
}
return total;
}

function label(score){
if(score>=90) return "🔥 Rare Match";
if(score>=80) return "💖 Strong Match";
if(score>=70) return "✨ Good Potential";
if(score>=60) return "⚖️ Mixed Match";
if(score>=50) return "⚠️ Challenging";
return "❌ Low Compatibility";
}

// ===== MAIN =====

function compare(){

let n1 = document.getElementById("name1").value || "Person 1";
let n2 = document.getElementById("name2").value || "Person 2";

let d1 = document.getElementById("dob1").value;
let d2 = document.getElementById("dob2").value;
let mode = document.getElementById("mode").value;

// VALIDATION
if(!d1 || !d2){
alert("Please enter both birthdays");
return;
}

let s1 = getSign(d1);
let s2 = getSign(d2);

let lp1 = lifePath(d1);
let lp2 = lifePath(d2);

// SCORE LOGIC
let score = 60;

if(s1.element === s2.element) score += 15;
if(s1.name === s2.name) score += 10;

if((s1.element=="Water" && s2.element=="Earth") ||
   (s1.element=="Earth" && s2.element=="Water") ||
   (s1.element=="Fire" && s2.element=="Air") ||
   (s1.element=="Air" && s2.element=="Fire")) score += 10;

if(lp1===lp2) score+=5;

if(mode==="friend") score+=5;
if(mode==="business" && (s1.element=="Earth"||s2.element=="Earth")) score+=5;

// RANDOM CONTENT
let summary = summaries[Math.floor(Math.random()*summaries.length)];
let quote = quotes[Math.floor(Math.random()*quotes.length)];

let strengths = strengthsList.slice(0,3);
let challenges = challengesList.slice(0,3);

// OUTPUT
document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML = `
<div class="name">${n1} ❤️ ${n2}</div>

<div class="score">${score}%</div>
<div class="label">${label(score)}</div>

<div class="section">
${s1.name} + ${s2.name}
</div>

<div class="section">
${stones[new Date(d1).getMonth()+1]} • ${stones[new Date(d2).getMonth()+1]}
</div>

<div class="section">
<b>${summary}</b>
</div>

<div class="section">
<h3>Strengths</h3>
<ul>${strengths.map(s=>`<li>${s}</li>`).join("")}</ul>
</div>

<div class="section">
<h3>Challenges</h3>
<ul>${challenges.map(c=>`<li>${c}</li>`).join("")}</ul>
</div>

<div class="quote">
"${quote}"
</div>
`;

}

</script>

</body>
</html>
