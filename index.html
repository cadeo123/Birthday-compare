<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Compare</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: linear-gradient(135deg, #0a0a0a, #111);
  color: white;
  padding: 20px;
}
.container {
  max-width: 500px;
  margin: auto;
}
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 18px;
  margin-bottom: 15px;
  border: 1px solid rgba(255,255,255,0.1);
}
input, select {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 14px;
  border: none;
  background: #111;
  color: white;
}
button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border-radius: 14px;
  border: none;
  font-weight: bold;
  background: linear-gradient(90deg, #ff4d6d, #c77dff);
  color: white;
}
.score {
  font-size: 48px;
  font-weight: bold;
  background: linear-gradient(90deg, #ff4d6d, #c77dff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.name { font-size: 22px; font-weight: bold; }
.label { opacity: 0.7; }
.section { margin-top: 15px; }
.quote { margin-top: 15px; font-style: italic; }
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>Birthday Compare</h2>
<p>Find your real compatibility</p>
</div>

<div class="card">
<input id="name1" placeholder="Name 1">
<input id="dob1" type="date">

<input id="name2" placeholder="Name 2">
<input id="dob2" type="date">

<select id="mode">
<option value="love">❤️ Relationship</option>
<option value="friend">🤝 Friendship</option>
<option value="business">💼 Business</option>
</select>

<button onclick="compare()">Compare</button>
</div>

<div id="result" class="card" style="display:none;"></div>

</div>

<script>

// ===== DATA =====
const signs = [
{ name:'Capricorn', start:[12,22], end:[1,19], element:'Earth' },
{ name:'Aquarius', start:[1,20], end:[2,18], element:'Air' },
{ name:'Pisces', start:[2,19], end:[3,20], element:'Water' },
{ name:'Aries', start:[3,21], end:[4,19], element:'Fire' },
{ name:'Taurus', start:[4,20], end:[5,20], element:'Earth' },
{ name:'Gemini', start:[5,21], end:[6,20], element:'Air' },
{ name:'Cancer', start:[6,21], end:[7,22], element:'Water' },
{ name:'Leo', start:[7,23], end:[8,22], element:'Fire' },
{ name:'Virgo', start:[8,23], end:[9,22], element:'Earth' },
{ name:'Libra', start:[9,23], end:[10,22], element:'Air' },
{ name:'Scorpio', start:[10,23], end:[11,21], element:'Water' },
{ name:'Sagittarius', start:[11,22], end:[12,21], element:'Fire' }
];

const stones = {
1:'Garnet',2:'Amethyst',3:'Aquamarine',4:'Diamond',
5:'Emerald',6:'Pearl',7:'Ruby',8:'Peridot',
9:'Sapphire',10:'Opal',11:'Topaz',12:'Turquoise'
};

const special = {
"Cancer-Pisces": {score:90, summary:"A rare emotional connection.", quote:"You don’t have to explain feelings here."},
"Pisces-Cancer": {score:90, summary:"Deep intuitive bond.", quote:"This feels natural and safe."},
"Leo-Aries": {score:88, summary:"High energy attraction.", quote:"Fire meets fire."},
"Taurus-Virgo": {score:85, summary:"Stable long-term match.", quote:"Built on consistency."},
"Scorpio-Cancer": {score:92, summary:"Deep emotional loyalty.", quote:"This runs deep."}
};

// ===== FUNCTIONS =====
function getSign(date){
let d = new Date(date);
let m = d.getMonth()+1;
let day = d.getDate();

for(let s of signs){
let [sm,sd]=s.start;
let [em,ed]=s.end;

if(
(sm<=em && (m==sm && day>=sd || m==em && day<=ed || (m>sm && m<em))) ||
(sm>em && (m==sm && day>=sd || m==em && day<=ed || m>sm || m<em))
){
return s;
}
}
}

function label(score){
if(score>=90) return "🔥 Rare Match";
if(score>=80) return "💖 Strong Match";
if(score>=70) return "✨ Good Potential";
if(score>=60) return "⚖️ Mixed Match";
if(score>=50) return "⚠️ Challenging";
return "❌ Low Compatibility";
}

// ===== MAIN =====
function compare(){

let n1 = document.getElementById("name1").value || "Person 1";
let n2 = document.getElementById("name2").value || "Person 2";

let d1 = document.getElementById("dob1").value;
let d2 = document.getElementById("dob2").value;

if(!d1 || !d2){
alert("Enter both birthdays");
return;
}

let s1 = getSign(d1);
let s2 = getSign(d2);

let key = `${s1.name}-${s2.name}`;
let result;

if(special[key]){
result = special[key];
}else{
let score = 60;

if(s1.element === s2.element) score += 15;

if(
(s1.element=="Water" && s2.element=="Earth") ||
(s1.element=="Earth" && s2.element=="Water") ||
(s1.element=="Fire" && s2.element=="Air") ||
(s1.element=="Air" && s2.element=="Fire")
) score += 10;

let summaries = [
"This connection has potential.",
"Attraction is there but needs effort.",
"This can work with good communication."
];

let quotes = [
"Some connections grow over time.",
"Consistency decides this one.",
"Potential is here."
];

result = {
score,
summary: summaries[Math.floor(Math.random()*summaries.length)],
quote: quotes[Math.floor(Math.random()*quotes.length)]
};
}

// ===== OUTPUT =====
document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML = `
<div class="name">${n1} ❤️ ${n2}</div>

<div class="score">${result.score}%</div>
<div class="label">${label(result.score)}</div>

<div class="section">${s1.name} + ${s2.name}</div>

<div class="section">
${stones[new Date(d1).getMonth()+1]} • ${stones[new Date(d2).getMonth()+1]}
</div>

<div class="section"><b>${result.summary}</b></div>

<div class="quote">"${result.quote}"</div>

<div style="margin-top:15px; display:flex; flex-direction:column; gap:10px;">
<button onclick="shareNative()">📤 Share</button>
<button onclick="shareWhatsApp()">🟢 Send via WhatsApp</button>
<button onclick="copyResult()">📋 Copy Result</button>
</div>
`;
}

// ===== SHARE SYSTEM =====
function getShareText(){
return document.getElementById("result").innerText + "\n\nTry yours 👀\n" + window.location.href;
}

function shareNative(){
let text = getShareText();

if(navigator.share){
navigator.share({
title: "Compatibility Result",
text: text,
url: window.location.href
});
}else{
alert("Use WhatsApp or Copy below 👇");
}
}

function shareWhatsApp(){
let text = encodeURIComponent(getShareText());
window.open(`https://wa.me/?text=${text}`, "_blank");
}

function copyResult(){
let text = getShareText();
navigator.clipboard.writeText(text);
alert("Copied — paste it anywhere 🔥");
}

</script>

</body>
</html>
