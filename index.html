<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Compare</title>

<!-- 🔥 GOOGLE ANALYTICS -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9909V32B75"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-9909V32B75');
</script>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: linear-gradient(135deg, #0a0a0a, #111);
  color: white;
  padding: 20px;
}
.container {
  max-width: 500px;
  margin: auto;
}
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 18px;
  margin-bottom: 15px;
  border: 1px solid rgba(255,255,255,0.1);
}
input {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 14px;
  border: none;
  background: #111;
  color: white;
}
button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border-radius: 14px;
  border: none;
  font-weight: bold;
  background: linear-gradient(90deg, #ff4d6d, #c77dff);
  color: white;
}
.score {
  font-size: 48px;
  font-weight: bold;
  background: linear-gradient(90deg, #ff4d6d, #c77dff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.name { font-size: 22px; font-weight: bold; }
.label { opacity: 0.7; }
.section { margin-top: 15px; }
.quote { margin-top: 15px; font-style: italic; }
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>Birthday Compare</h2>
<p>Find your real compatibility</p>
</div>

<div class="card">
<input id="name1" placeholder="Name 1">
<input id="dob1" type="date">

<input id="name2" placeholder="Name 2">
<input id="dob2" type="date">

<button onclick="compare()">Compare</button>
</div>

<div id="result" class="card" style="display:none;"></div>

</div>

<script>

// ===== TRACKING =====
function track(eventName){
  if(typeof gtag === "function"){
    gtag('event', eventName);
  }
}

// ===== SHARE COUNT =====
let shareCount = parseInt(localStorage.getItem("shares")) || 0;

// ===== DATA =====
const signs = [
{ name:'Capricorn', start:[12,22], end:[1,19], element:'Earth' },
{ name:'Aquarius', start:[1,20], end:[2,18], element:'Air' },
{ name:'Pisces', start:[2,19], end:[3,20], element:'Water' },
{ name:'Aries', start:[3,21], end:[4,19], element:'Fire' },
{ name:'Taurus', start:[4,20], end:[5,20], element:'Earth' },
{ name:'Gemini', start:[5,21], end:[6,20], element:'Air' },
{ name:'Cancer', start:[6,21], end:[7,22], element:'Water' },
{ name:'Leo', start:[7,23], end:[8,22], element:'Fire' },
{ name:'Virgo', start:[8,23], end:[9,22], element:'Earth' },
{ name:'Libra', start:[9,23], end:[10,22], element:'Air' },
{ name:'Scorpio', start:[10,23], end:[11,21], element:'Water' },
{ name:'Sagittarius', start:[11,22], end:[12,21], element:'Fire' }
];

function getSign(date){
let d = new Date(date);
let m = d.getMonth()+1;
let day = d.getDate();

for(let s of signs){
let [sm,sd]=s.start;
let [em,ed]=s.end;

if(
(sm<=em && (m==sm && day>=sd || m==em && day<=ed || (m>sm && m<em))) ||
(sm>em && (m==sm && day>=sd || m==em && day<=ed || m>sm || m<em))
){
return s;
}
}
}

function label(score){
if(score>=90) return "🔥 Rare Match";
if(score>=80) return "💖 Strong Match";
if(score>=70) return "✨ Good Potential";
if(score>=60) return "⚖️ Mixed Match";
if(score>=50) return "⚠️ Challenging";
return "❌ Low Compatibility";
}

// ===== MAIN =====
function compare(){

track("compare_clicked");

let n1 = document.getElementById("name1").value || "Person 1";
let n2 = document.getElementById("name2").value || "Person 2";

let d1 = document.getElementById("dob1").value;
let d2 = document.getElementById("dob2").value;

if(!d1 || !d2){
alert("Enter both birthdays");
return;
}

let s1 = getSign(d1);
let s2 = getSign(d2);

let score = 60;
if(s1.element === s2.element) score += 15;
if(
(s1.element=="Water" && s2.element=="Earth") ||
(s1.element=="Earth" && s2.element=="Water") ||
(s1.element=="Fire" && s2.element=="Air") ||
(s1.element=="Air" && s2.element=="Fire")
) score += 10;

// ===== OUTPUT =====
document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML = `
<div class="name">${n1} ❤️ ${n2}</div>
<div class="score">${score}%</div>
<div class="label">${label(score)}</div>

<div class="section">${s1.name} + ${s2.name}</div>

<div class="quote">"There’s something interesting between you two."</div>

<div style="margin-top:15px;">
<button onclick="shareNative()">📤 Share</button>
<button onclick="shareWhatsApp()">🟢 WhatsApp</button>
<button onclick="copyResult()">📋 Copy</button>
</div>

<div id="premiumBox"></div>
`;

renderPremium();

}

// ===== SHARE SYSTEM =====
function getShareText(){
return document.getElementById("result").innerText + "\n\nTry yours 👀\n" + window.location.href;
}

function shareNative(){
track("share_native");

let text = getShareText();

if(navigator.share){
navigator.share({title:"Match Result", text, url:window.location.href});
}else{
alert("Use WhatsApp or Copy 👇");
}
}

function shareWhatsApp(){
track("share_whatsapp");

let text = encodeURIComponent(getShareText());
window.open(`https://wa.me/?text=${text}`, "_blank");

shareCount++;
localStorage.setItem("shares", shareCount);

renderPremium();
}

function copyResult(){
track("copy_result");

let text = getShareText();
navigator.clipboard.writeText(text);
alert("Copied 🔥");
}

// ===== PREMIUM =====
function renderPremium(){

let box = document.getElementById("premiumBox");

if(shareCount >= 5){

track("premium_unlocked");

box.innerHTML = `
<div style="margin-top:15px; padding:12px; background:#111; border-radius:12px;">
✅ <b>Full Compatibility Insight</b>

<p>❤️ Emotional: Strong connection with depth</p>
<p>🧠 Communication: Needs balance</p>
<p>⚠️ Challenges: Emotional timing</p>
<p>🔥 Attraction: High chemistry</p>
<p>⏳ Long-term: Good potential</p>
</div>
`;

}else{

box.innerHTML = `
<div style="margin-top:15px; padding:12px; background:#111; border-radius:12px;">

🔒 <b>Unlock Full Insight</b>

<p>Share with friends (${shareCount}/5)</p>

<button onclick="shareWhatsApp()">Share to unlock</button>

<button onclick="fakeUnlock()">Unlock for £0.99</button>

</div>
`;
}
}

function fakeUnlock(){
track("clicked_unlock");
alert("Payment coming next 🔥");
}

</script>

</body>
</html>
