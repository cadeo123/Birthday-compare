<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-9909V32B75"></script>
  <script>

  </script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #090909, #131313 55%, #1a1020);
      color: #fff;
      padding: 20px;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
    }

    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1, h2, h3, p {
      margin-top: 0;
    }

    h1 {
      font-size: 28px;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .subtle {
      color: rgba(255,255,255,0.72);
      font-size: 15px;
      line-height: 1.45;
    }

    input, button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-size: 16px;
      margin-top: 10px;
    }

    input {
      background: #111;
      color: #fff;
    }

    button {
      cursor: pointer;
      color: #fff;
      font-weight: 700;
      background: linear-gradient(90deg, #ff4d6d, #c77dff);
    }

    .secondary-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .score {
      font-size: 54px;
      font-weight: 800;
      margin: 4px 0 6px;
      background: linear-gradient(90deg, #ff4d6d, #c77dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .pair-name {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .label {
      color: rgba(255,255,255,0.72);
      margin-bottom: 12px;
      font-weight: 600;
    }

    .pill-row {
      margin-top: 10px;
    }

    .pill {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      margin: 0 8px 8px 0;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .section {
      margin-top: 16px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 8px;
      color: rgba(255,255,255,0.85);
    }

    .summary {
      font-size: 16px;
      line-height: 1.5;
    }

    .quote {
      margin-top: 14px;
      font-style: italic;
      color: rgba(255,255,255,0.92);
      line-height: 1.5;
    }

    .micro-hook {
      margin-top: 10px;
      font-size: 13px;
      color: rgba(255,255,255,0.62);
    }

    .premium-box {
      margin-top: 16px;
      padding: 14px;
      border-radius: 16px;
      background: #111;
      border: 1px solid rgba(255,255,255,0.07);
    }

    .premium-box p {
      margin-bottom: 10px;
      line-height: 1.45;
    }

    .teaser {
      color: rgba(255,255,255,0.78);
    }

    .locked {
      color: #ffb3c1;
      font-weight: 700;
    }

    .success {
      color: #9effc7;
      font-weight: 700;
    }

    .result-actions {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 14px 0;
    }

    .tiny {
      font-size: 12px;
      color: rgba(255,255,255,0.56);
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="card">
      <h1>This exposed our compatibility… 👀</h1>
      <p class="subtle">Try this with someone, but don’t blame me if it gets awkward. Most people test an ex, a crush, or their partner first.</p>
    </div>

    <div class="card">
      <input id="name1" placeholder="Your name" />
      <input id="dob1" type="date" />

      <input id="name2" placeholder="Their name" />
      <input id="dob2" type="date" />

      <button onclick="compare()">Check compatibility</button>
      <p class="tiny" style="margin-top:10px;">Tip: this gets the best reactions when you send the result to the person you tested 😅</p>
    </div>

    <div id="result" class="card" style="display:none;"></div>

  </div>

  <script>
    function track(eventName, params = {}) {
      if (typeof gtag === "function") {
        gtag("event", eventName, params);
      }
    }

    function getUserId() {
      let id = localStorage.getItem("uid");
      if (!id) {
        id = "u_" + Math.random().toString(36).substring(2, 10);
        localStorage.setItem("uid", id);
        track("user_id_created", { user_id: id });
      }
      return id;
    }

    const userId = getUserId();

    const urlParams = new URLSearchParams(window.location.search);
    const refSource = urlParams.get("ref") || "direct";
    const refUser = urlParams.get("uid") || null;

    track("page_view_with_ref", {
      source: refSource,
      current_user: userId,
      ref_user: refUser || "none"
    });

    if (refSource !== "direct") {
      track("incoming_user", {
        source: refSource,
        current_user: userId,
        ref_user: refUser || "none"
      });
    }

    if (refUser && refUser !== userId) {
      track("referral_visit", {
        from_user: refUser,
        to_user: userId,
        source: refSource
      });
    }

    let shareCount = parseInt(sessionStorage.getItem("shares") || "0", 10);

    const signs = [
      { name:'Capricorn', start:[12,22], end:[1,19], element:'Earth' },
      { name:'Aquarius', start:[1,20], end:[2,18], element:'Air' },
      { name:'Pisces', start:[2,19], end:[3,20], element:'Water' },
      { name:'Aries', start:[3,21], end:[4,19], element:'Fire' },
      { name:'Taurus', start:[4,20], end:[5,20], element:'Earth' },
      { name:'Gemini', start:[5,21], end:[6,20], element:'Air' },
      { name:'Cancer', start:[6,21], end:[7,22], element:'Water' },
      { name:'Leo', start:[7,23], end:[8,22], element:'Fire' },
      { name:'Virgo', start:[8,23], end:[9,22], element:'Earth' },
      { name:'Libra', start:[9,23], end:[10,22], element:'Air' },
      { name:'Scorpio', start:[10,23], end:[11,21], element:'Water' },
      { name:'Sagittarius', start:[11,22], end:[12,21], element:'Fire' }
    ];

    const birthstones = {
      1:'Garnet',
      2:'Amethyst',
      3:'Aquamarine',
      4:'Diamond',
      5:'Emerald',
      6:'Pearl',
      7:'Ruby',
      8:'Peridot',
      9:'Sapphire',
      10:'Opal',
      11:'Topaz',
      12:'Turquoise'
    };

    const specialPairs = {
      "Cancer-Pisces": {
        score: 90,
        summary: "This is one of those rare emotional connections where both people naturally understand each other. It usually feels soft, deep, and hard to fake.",
        quote: "You don’t have to explain your feelings here — they’re already felt.",
        premium: {
          emotional: "Very strong emotional pull. One person tends to feel safe here, the other feels deeply understood.",
          communication: "Usually intuitive, but silence can create overthinking if feelings are not said out loud.",
          challenge: "This pair can get overwhelmed by emotion and avoid saying the harder thing directly.",
          attraction: "High. It often feels comforting and magnetic at the same time.",
          longTerm: "Strong long-term potential when both stay honest and don’t expect mind-reading."
        }
      },
      "Pisces-Cancer": {
        score: 90,
        summary: "A deeply intuitive bond that feels safe, emotional, and naturally aligned. This usually feels more serious than it looks from the outside.",
        quote: "This feels like comfort, connection, and something hard to replace.",
        premium: {
          emotional: "This pairing tends to create a strong emotional cocoon around both people.",
          communication: "Easy when both are open, messy when one retreats into mood or silence.",
          challenge: "Avoiding conflict can become the real problem here.",
          attraction: "Warm, intimate, and emotionally sticky.",
          longTerm: "Very good if both create reassurance instead of assumptions."
        }
      },
      "Scorpio-Cancer": {
        score: 92,
        summary: "This pairing can feel intense, loyal, and emotionally powerful. When it works, it feels unforgettable.",
        quote: "This connection runs deep — not surface level.",
        premium: {
          emotional: "Very deep emotional intensity. Loyalty can become a major strength here.",
          communication: "Strong when trust is present, guarded when hurt appears.",
          challenge: "Jealousy, secrecy, or emotional defensiveness can throw this off fast.",
          attraction: "Very high chemistry. This usually feels strong from the start.",
          longTerm: "Excellent potential if both handle intensity maturely."
        }
      },
      "Cancer-Scorpio": {
        score: 92,
        summary: "This pairing can feel intense, loyal, and emotionally powerful. It can become very real, very fast.",
        quote: "This connection runs deep — not surface level.",
        premium: {
          emotional: "One of the strongest emotional match types when trust builds properly.",
          communication: "Deep conversations happen naturally, but emotional walls can slow things down.",
          challenge: "Control and protectiveness can create friction.",
          attraction: "High magnetic pull, often hard to ignore.",
          longTerm: "Great long-term potential when both stop testing each other emotionally."
        }
      },
      "Leo-Aries": {
        score: 88,
        summary: "High energy, strong attraction, and a powerful dynamic. This usually feels exciting, bold, and hard to ignore.",
        quote: "Fire meets fire — intense, exciting, and never boring.",
        premium: {
          emotional: "This is less soft and more energising. The connection feels alive.",
          communication: "Direct, fast, and sometimes blunt.",
          challenge: "Ego clashes or competition can become the issue.",
          attraction: "Very high. Chemistry often shows up quickly.",
          longTerm: "Strong if both admire rather than compete with each other."
        }
      },
      "Aries-Leo": {
        score: 88,
        summary: "High energy, strong attraction, and a powerful dynamic. When this clicks, it feels electric.",
        quote: "Fire meets fire — intense, exciting, and never boring.",
        premium: {
          emotional: "This match runs more on energy and confidence than soft reassurance.",
          communication: "Fast and bold, but sometimes too reactive.",
          challenge: "Both may want to lead.",
          attraction: "High. There is usually a visible spark.",
          longTerm: "Works well when respect stays higher than pride."
        }
      },
      "Taurus-Virgo": {
        score: 85,
        summary: "A grounded, steady pairing with strong long-term potential. This usually feels dependable rather than chaotic.",
        quote: "This works because both of you value consistency and loyalty.",
        premium: {
          emotional: "Steady and reliable. This grows stronger with time.",
          communication: "Practical and calm, though feelings may need more direct expression.",
          challenge: "Routine can become dull if neither brings freshness.",
          attraction: "Subtle but real. This often deepens instead of exploding.",
          longTerm: "Very strong when both keep showing up consistently."
        }
      },
      "Virgo-Taurus": {
        score: 85,
        summary: "A grounded, steady pairing with strong long-term potential. This often feels safe and buildable.",
        quote: "This works because both of you value consistency and loyalty.",
        premium: {
          emotional: "Less dramatic, more secure.",
          communication: "Clear and useful, but emotional softness needs effort.",
          challenge: "Overthinking and stubbornness can create small repeated tension.",
          attraction: "Slow burn, usually stronger than it first looks.",
          longTerm: "Very solid if both avoid becoming too rigid."
        }
      },
      "Gemini-Libra": {
        score: 84,
        summary: "A light, social, and naturally flowing connection with easy conversation. This often feels easy right away.",
        quote: "This match works best when the energy stays playful and open.",
        premium: {
          emotional: "This pair connects through vibe, banter, and mental flow.",
          communication: "One of the easiest communication styles overall.",
          challenge: "Depth can be dodged if both stay too surface-level.",
          attraction: "Fun and flirt-heavy.",
          longTerm: "Good when playfulness is matched by real substance."
        }
      },
      "Libra-Gemini": {
        score: 84,
        summary: "A light, social, and naturally flowing connection with easy conversation. This usually starts easy and stays interesting.",
        quote: "This match works best when the energy stays playful and open.",
        premium: {
          emotional: "This connection is often more mental first, emotional second.",
          communication: "Very strong. This pair rarely runs out of things to say.",
          challenge: "Avoidance of heavier feelings can weaken the bond over time.",
          attraction: "Playful and naturally magnetic.",
          longTerm: "Good if both move beyond charm into honesty."
        }
      }
    };

    const fallbackSummaries = [
      "There’s something here, but how strong it gets depends on communication, timing, and whether both people are actually honest.",
      "This connection has potential, but one person may feel more than the other at first.",
      "There’s attraction here, but differences in style or emotional pace may need patience.",
      "This can work surprisingly well, but only if both people stop guessing and start communicating.",
      "This pairing can feel strong in the moment, but consistency decides whether it becomes something real."
    ];

    const fallbackQuotes = [
      "Be honest… this feels accurate, doesn’t it?",
      "Some connections grow stronger the moment both people stop pretending.",
      "Potential is here — what happens next depends on effort.",
      "This could go very right… or get messy fast.",
      "Sometimes the strongest matches still need the clearest communication."
    ];

    function getSign(dateStr) {
      const d = new Date(dateStr);
      if (Number.isNaN(d.getTime())) return null;

      const m = d.getMonth() + 1;
      const day = d.getDate();

      for (const s of signs) {
        const [sm, sd] = s.start;
        const [em, ed] = s.end;

        const normalRange =
          sm <= em &&
          (
            (m === sm && day >= sd) ||
            (m === em && day <= ed) ||
            (m > sm && m < em)
          );

        const wrappedRange =
          sm > em &&
          (
            (m === sm && day >= sd) ||
            (m === em && day <= ed) ||
            m > sm ||
            m < em
          );

        if (normalRange || wrappedRange) return s;
      }

      return null;
    }

    function getBirthstone(dateStr) {
      const d = new Date(dateStr);
      if (Number.isNaN(d.getTime())) return "";
      return birthstones[d.getMonth() + 1] || "";
    }

    function label(score) {
      if (score >= 90) return "🔥 Rare Match";
      if (score >= 80) return "💖 Strong Match";
      if (score >= 70) return "✨ Good Potential";
      if (score >= 60) return "⚖️ Mixed Match";
      if (score >= 50) return "⚠️ Challenging";
      return "❌ Low Compatibility";
    }

    function buildFallbackResult(sign1, sign2) {
      let score = 60;

      if (sign1.element === sign2.element) score += 15;

      const supportive =
        (sign1.element === "Water" && sign2.element === "Earth") ||
        (sign1.element === "Earth" && sign2.element === "Water") ||
        (sign1.element === "Fire" && sign2.element === "Air") ||
        (sign1.element === "Air" && sign2.element === "Fire");

      if (supportive) score += 10;

      return {
        score,
        summary: fallbackSummaries[Math.floor(Math.random() * fallbackSummaries.length)],
        quote: fallbackQuotes[Math.floor(Math.random() * fallbackQuotes.length)],
        premium: {
          emotional: "There is emotional potential here, but one of you may need more reassurance than the other expects.",
          communication: "This works better when feelings are said clearly instead of implied.",
          challenge: "The main issue is usually timing, assumptions, or different emotional pace.",
          attraction: "There is enough spark here to build on, but the strength varies by effort.",
          longTerm: "Possible, but it depends more on consistency than instant chemistry."
        }
      };
    }

    function escapeHtml(str) {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    let latestResult = null;

    function compare() {
      shareCount = 0;
      sessionStorage.setItem("shares", "0");
      sessionStorage.removeItem("premiumTracked");

      track("compare_clicked", { current_user: userId });

      const n1 = document.getElementById("name1").value.trim() || "Person 1";
      const n2 = document.getElementById("name2").value.trim() || "Person 2";
      const d1 = document.getElementById("dob1").value;
      const d2 = document.getElementById("dob2").value;

      if (!d1 || !d2) {
        alert("Enter both birthdays");
        return;
      }

      const s1 = getSign(d1);
      const s2 = getSign(d2);

      if (!s1 || !s2) {
        alert("Could not calculate one of the zodiac signs.");
        return;
      }

      const key = `${s1.name}-${s2.name}`;
      const pairResult = specialPairs[key] || buildFallbackResult(s1, s2);

      latestResult = {
        name1: n1,
        name2: n2,
        sign1: s1,
        sign2: s2,
        stone1: getBirthstone(d1),
        stone2: getBirthstone(d2),
        score: pairResult.score,
        summary: pairResult.summary,
        quote: pairResult.quote,
        premium: pairResult.premium
      };

      renderResult();
    }

    function renderResult() {
      if (!latestResult) return;

      const r = latestResult;
      const resultEl = document.getElementById("result");
      resultEl.style.display = "block";

      resultEl.innerHTML = `
        <div class="pair-name">${escapeHtml(r.name1)} ❤️ ${escapeHtml(r.name2)}</div>
        <div class="score">${r.score}%</div>
        <div class="label">${label(r.score)}</div>

        <div class="section">
          <div class="section-title">Match</div>
          <div><strong>${r.sign1.name}</strong> + <strong>${r.sign2.name}</strong></div>
          <div class="pill-row">
            <span class="pill">${r.sign1.element}</span>
            <span class="pill">${r.sign2.element}</span>
            <span class="pill">${r.stone1}</span>
            <span class="pill">${r.stone2}</span>
          </div>
        </div>

        <div class="section">
          <div class="section-title">What this feels like</div>
          <div class="summary"><b>${r.summary}</b></div>
        </div>

        <div class="quote">"${r.quote}"</div>

        <div class="micro-hook">Be honest… this feels accurate, doesn’t it?</div>
        <div class="micro-hook">Most people send this to the person they tested 👀</div>

        <div class="result-actions">
          <button onclick="shareNative()">📤 Share result</button>
          <button onclick="shareWhatsApp()">🟢 Send via WhatsApp</button>
          <button class="secondary-btn" onclick="copyResult()">📋 Copy result</button>
        </div>

        <div id="premiumBox"></div>
      `;

      renderPremium();
    }

    function getShareUrl(source = "direct") {
      const baseUrl = window.location.origin + window.location.pathname;
      return `${baseUrl}?ref=${encodeURIComponent(source)}&uid=${encodeURIComponent(userId)}`;
    }

    function getShareText(source = "direct") {
      if (!latestResult) return getShareUrl(source);

      return `${latestResult.name1} ❤️ ${latestResult.name2}

${latestResult.score}% compatibility
${label(latestResult.score)}

${latestResult.summary}

"${latestResult.quote}"

Try yours 👀
${getShareUrl(source)}`;
    }

    function incrementShareCount(source) {
      shareCount += 1;
      sessionStorage.setItem("shares", String(shareCount));
      track("share_count_incremented", {
        source,
        count: shareCount,
        current_user: userId
      });
      renderPremium();
    }

    async function shareNative() {
      track("share_native_clicked", { current_user: userId });

      const text = getShareText("native");
      const url = getShareUrl("native");

      if (navigator.share) {
        try {
          await navigator.share({
            title: "Compatibility Result",
            text,
            url
          });
          incrementShareCount("native");
        } catch (e) {
          track("share_native_cancelled", { current_user: userId });
        }
      } else {
        alert("Use WhatsApp or Copy below 👇");
      }
    }

    function shareWhatsApp() {
      track("share_whatsapp_clicked", { current_user: userId });
      const text = encodeURIComponent(getShareText("whatsapp"));
      window.open(`https://wa.me/?text=${text}`, "_blank");
      incrementShareCount("whatsapp");
    }

    async function copyResult() {
      track("copy_result_clicked", { current_user: userId });

      try {
        await navigator.clipboard.writeText(getShareText("copy"));
        alert("Copied — paste it anywhere 🔥");
        // Intentionally no shareCount increment here
      } catch (e) {
        alert("Copy failed on this device.");
      }
    }

    function renderPremium() {
      const box = document.getElementById("premiumBox");
      if (!box || !latestResult) return;

      if (shareCount >= 5) {
        if (!sessionStorage.getItem("premiumTracked")) {
          track("premium_unlocked", { current_user: userId });
          sessionStorage.setItem("premiumTracked", "true");
        }

        box.innerHTML = `
          <div class="premium-box">
            <div class="success">✅ Full compatibility insight unlocked</div>

            <div class="section">
              <div class="section-title">❤️ Emotional</div>
              <p>${latestResult.premium.emotional}</p>
            </div>

            <div class="section">
              <div class="section-title">🧠 Communication</div>
              <p>${latestResult.premium.communication}</p>
            </div>

            <div class="section">
              <div class="section-title">⚠️ Main challenge</div>
              <p>${latestResult.premium.challenge}</p>
            </div>

            <div class="section">
              <div class="section-title">🔥 Attraction</div>
              <p>${latestResult.premium.attraction}</p>
            </div>

            <div class="section">
              <div class="section-title">⏳ Long-term</div>
              <p>${latestResult.premium.longTerm}</p>
            </div>
          </div>
        `;
      } else {
        box.innerHTML = `
          <div class="premium-box">
            <div class="locked">⚠️ There’s something you’re not seeing...</div>

            <div class="section teaser">
              <p>❤️ Emotional: Strong… but unbalanced</p>
              <p>🧠 Communication: Looks fine on the surface</p>
              <p>The real issue is hidden below 👇</p>
            </div>

            <div class="divider"></div>

            <p><b>Unlock full insight</b> by sharing with 5 people or unlock instantly.</p>
            <p class="small">Progress: ${shareCount}/5 tracked shares</p>

            <button onclick="shareWhatsApp()">Unlock by sharing (fastest)</button>
            <button class="secondary-btn" onclick="fakeUnlock()">Unlock instantly for £0.99</button>

            <div class="micro-hook">Copying tracks visits, but only tracked shares unlock this 😅</div>
          </div>
        `;
      }
    }

    function fakeUnlock() {
      track("clicked_unlock", { current_user: userId });
      alert("Payment hook clicked — connect this to Stripe next.");
    }
  </script>
</body>
</html>
